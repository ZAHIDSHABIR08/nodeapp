version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 16 # Specify the Node.js version
    commands:
      - echo Installing dependencies...
      - npm install
  build:
    commands:
      - echo Building the application...
      - npm run build # Ensure you have a "build" script in package.json
  post_build:
    commands:
      - echo Build stage complete.
      - echo Uploading artifacts...

artifacts:
  files:
    - '**/*' # Specify what files to include in the build output
